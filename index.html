<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container-fluid bg-white border-bottom shadow-sm mb-4">
        <header class="d-flex flex-wrap justify-content-center py-3 container">
          <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <span class="fs-4 fw-bold text-primary">Ctrl Fn</span>
          </a>
          <ul class="nav nav-pills">
            <li class="nav-item"><a id="nav-home" href="#" class="nav-link active">Home</a></li>
            <li class="nav-item"><a id="nav-transacao" href="#" class="nav-link">Transações</a></li>
            <li class="nav-item"><a id="nav-categoria" href="#" class="nav-link">Categorias</a></li>
          </ul>
        </header>
    </div>

    <div class="container mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-center p-3">
                    <h6 class="text-muted small text-uppercase">Saldo Atual</h6>
                    <h3 id="resumo-saldo" class="fw-bold">R$ 0,00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-center p-3 border-start border-success border-4">
                    <h6 class="text-muted small text-uppercase">Receitas (Mês)</h6>
                    <h3 id="resumo-receitas" class="text-success fw-bold">R$ 0,00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-center p-3 border-start border-danger border-4">
                    <h6 class="text-muted small text-uppercase">Despesas (Mês)</h6>
                    <h3 id="resumo-despesas" class="text-danger fw-bold">R$ 0,00</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="mb-4">Nova Transação</h5>
                    <form id="transacao-form">
                        <div class="mb-3">
                            <label class="form-label small">Tipo</label>
                            <select class="form-select" id="transacao-tipo" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Categoria</label>
                            <select class="form-select" id="transacao-categoria"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Data</label>
                            <input type="date" class="form-control" id="transacao-data" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Valor (R$)</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="transacao-valor" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Descrição</label>
                            <input type="text" class="form-control" id="transacao-descricao">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Adicionar</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="row g-4">
                    <div class="col-12">
                        <div class="card border-0 shadow-sm p-4">
                            <h5>Despesas por Categoria (Mês Atual)</h5>
                            <div style="max-height: 300px;" class="d-flex justify-content-center">
                                <canvas id="grafico-categorias"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card border-0 shadow-sm p-4">
                            <h5>Últimas Transações</h5>
                            <div class="table-responsive">
                                <table class="table table-hover mt-3">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Data</th>
                                            <th>Categoria</th>
                                            <th>Descrição</th>
                                            <th class="text-end">Valor</th>
                                        </tr>
                                    </thead>
                                    <tbody id="lista-transacoes-tbody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5 pt-5 border-top">
        <div class="row">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4">
                    <h5>Nova Categoria</h5>
                    <form id="categoria-form">
                        <div class="mb-3">
                            <input id="categoria-nome" type="text" class="form-control" placeholder="Nome da Categoria" required>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
