<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

    <div class="container">
        <header
          class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
        >
          <a
            href="/"
            class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
          >
            <svg class="bi me-2" width="40" height="32" aria-hidden="true">
              <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4">Ctrl fn</span>
          </a>
          <ul class="nav nav-pills">
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page">Home</a>
            </li>
            <li class="nav-item"><a href="#" class="nav-link">+Transação</a></li>
            <li class="nav-item"><a href="#" class="nav-link">+Categoria</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Sobre</a></li>
          </ul>
        </header>
    </div>

    <div style="display:none;">
        <form action="" method="get">

          <label for="transacao-tipo">Escolha o tipo de Transação: </label>
          <select name="tipotransacao" id="transacao-tipo">
            <option value="">Selecione um item</option>
          </select>

          <label for="transacao-categoria">Escolha a Categoria: </label>
          <select name="categoria" id="transacao-categoria">
            <option value="">Selecione um item</option>
          </select>

          
          <label for="transacao-data">Data: </label>
          <input type="date" id="transacao-data" name="data">

          <label for="transacao-descricao">Descrição: </label>
          <input type="text" id="transacao-descricao" name="descricao">
          
          <button>Enviar Informações</button>

        </form>
    </div>
    
    <div style="display: none;">
      <form action="" method="get">

        <label for="categoria-nome">Cadastrar a nova Categoria: </label>
        <input type="text"placeholder="Nome da Categoria">

        <button>Cadastrar</button>

      </form>
    </div>
    
    <div style="display:;">
        <form action="" method="get">

          <label for="orcamento-categoria">Escolha a Categoria: </label>
          <select name="categoria" id="orcamento-categoria">
              <option value="">Selecione um item</option>
          </select>
          

          <label for="orcamento-limite">Defina o limite do seu orçamento: </label>
          <input type="number" id="orcamento-limite" placeholder="Valor limite" min="0" step="0.01">
          

          <label for="orcamento-mes">Escolha o mês: </label>
          <input type="month" id="orcamento-mes">

          <button>Clique aqui para enviar!!!</button>

        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
